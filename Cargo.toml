[package]
name = "fuiz-cloudflare"
version = "0.1.0"
edition = "2021"
authors = ["Khaleel Al-Adhami <khaleel.aladhami@gmail.com>"]

[package.metadata.release]
release = false

# https://github.com/rustwasm/wasm-pack/issues/1247
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib"]

[dependencies]
worker = { version = "0.3", features = ['http'] }
worker-macros = { version = "0.3", features = ['http'] }
console_error_panic_hook = { version = "0.1" }
http = "1.1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["serde_derive", "derive", "alloc"] }
serde_json = "1.0.116"
garde = { version = "0.20.0", features = ["derive"] }
enum-map = { version = "2.7.3", features = ["serde"] }
itertools = "0.13"
serde_with = "3.8"
thiserror = "1.0"
kinded = "0.3"
fastrand = "2.1"
web-time = { version = "1.1", features = ["serde"] }
fuiz = { git = "https://gitlab.com/opencode-mit/fuiz/game.git" }
