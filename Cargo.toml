[package]
name = "corkboard-cloudflare"
version = "0.1.0"
edition = "2021"
authors = ["Khaleel Al-Adhami <khaleel.aladhami@gmail.com>"]

[lib]
crate-type = ["cdylib"]

[dependencies]
worker = { version = "0.5", features = ['http'] }
worker-macros = { version = "0.5", features = ['http'] }
console_error_panic_hook = { version = "0.1" }
http = "1.2"
image = "0.25"
gif = "0.13"
serde = { version = "1.0", features = ["derive"] }
serde-hex = "0.1"
serde_json = "1.0"
