[package]
name = "corkboard"
version = "0.1.0"
edition = "2021"

[features]
https = []

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
dashmap = "6.1"
image = { version = "0.25" }
actix-web = "4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
actix-multipart = "0.7"
serde-hex = "0.1.0"
pretty_env_logger = "0.5"
actix-cors = "0.7"
rand = "0.8"
mime = "0.3"
gif = "0.13"
