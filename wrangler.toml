name = "fuiz-cloudflare"
main = "build/worker/shim.mjs"
compatibility_date = "2024-11-17"

services = [{ binding = "GAME_MANAGER", service = "fuiz-game-manager" }]

[build]
command = "cargo install -q worker-build && worker-build --release"

[durable_objects]
bindings = [{ name = "GAME", class_name = "Game" }]


[[migrations]]
tag = "v1"
new_classes = ["Game"]
